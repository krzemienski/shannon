id: pillar-04-meta-judge
pillar: meta-judge-consensus
goal: Rubric YAML is generated by meta-judge BEFORE any judge verdict is emitted (rubric-first
  discipline).
action:
  type: pipeline
  steps:
  - type: spawn-subagent
    subagent_type: shannon:meta-judge
    prompt: Build a rubric for evaluating a CLI tool's output quality.
  - type: spawn-subagent
    subagent_type: shannon:critic
    prompt: 'Apply the rubric to this output: ''Hello World''. Use the rubric you
      were given.'
expected_evidence:
- step 1 transcript contains rubric YAML with criteria + weights
- step 2 transcript references the rubric output from step 1
- rubric appeared in transcript ordering BEFORE any verdict text from step 2
gate_criteria:
- rubric YAML detected in step 1 output
- step 2 output cites rubric criteria by name
- no judging verdict emitted before rubric (verified by transcript line ordering)
runner: both
