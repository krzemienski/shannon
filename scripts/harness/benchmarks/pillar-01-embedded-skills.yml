id: pillar-01-embedded-skills
pillar: preloaded-sub-agent-skills
goal: 'Native skills: frontmatter — meta-judge has the full judge SKILL.md body
  preloaded into its startup context at spawn time without a Skill: round-trip.'
action:
  type: spawn-subagent
  subagent_type: shannon:meta-judge
  prompt: Generate a rubric YAML for evaluating a simple TypeScript function. Cite
    the preloaded judge skill's Iron Rule discipline as part of your response.
expected_evidence:
- transcript contains rubric YAML
- transcript contains text from the judge SKILL.md body preloaded via the agent's
  native skills frontmatter field — for example, the Iron Rule line
gate_criteria:
- subagent spawn succeeded (no error in transcript)
- rubric YAML present (criteria + weights structure)
- preloaded-content marker present (cite the specific phrase from judge SKILL.md)
runner: both
